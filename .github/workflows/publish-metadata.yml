name: Publish metadata

# Triggered when the maintainer manually promotes the draft Release created
# by release.yml. Also supports manual re-run via workflow_dispatch for
# recovery when something downstream needs a second attempt.
#
# v0 scope: regenerate the Sparkle appcast on gh-pages so installed copies
# of TNT see the new version, then bump the Homebrew tap so `brew upgrade`
# users pick up the new dmg.
#
# Job order matters: `publish-metadata` (appcast) runs first; `tap-bump`
# depends on it. A tap outage therefore never blocks Sparkle updates —
# the worst case is that brew users lag by one release until the
# tracking issue opened by `tap-bump` is resolved.
#
# Pattern mirrored from ContextFS/ctxfs/.github/workflows/publish-metadata.yml.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to reconcile (e.g. v0.0.1)"
        required: true

permissions:
  contents: write   # push to gh-pages

jobs:
  publish-metadata:
    name: Regenerate appcast
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout main (for helper scripts)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release artifacts (zip + sig)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/release-assets
          cd /tmp/release-assets
          # Skip *.dmg — we only need the .zip + .sig + checksums for the
          # appcast. The Homebrew step that needs the .dmg SHA lives in
          # the follow-up tap-bump PR (#10).
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.sig' \
            --pattern 'TNT-*.zip' \
            --pattern 'checksums.txt'
          ls -la

      - name: Parse artifact metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ steps.tag.outputs.tag }}"
          ASSETS=/tmp/release-assets

          # Sparkle EdDSA signature + zip length.
          SIG=$(tr -d '[:space:]' < "${ASSETS}/TNT-${VERSION}.zip.sig")
          ZIP_LEN=$(stat -c%s "${ASSETS}/TNT-${VERSION}.zip" 2>/dev/null || \
                    stat -f%z "${ASSETS}/TNT-${VERSION}.zip")

          # CFBundleVersion (build number) from the outer .app's Info.plist.
          # Sparkle's SUStandardVersionComparator compares <sparkle:version>
          # against the installed CFBundleVersion — passing the marketing
          # string (e.g. '0.0.1') against build 12 is parsed as [0,0,1]
          # vs [12,0,0] and Sparkle then misreports the update direction.
          # ctxfs hit this as the v0.1.1 incident; TNT inherits the fix.
          BUILD_NUMBER=$(python3 - <<EOF
          import plistlib, sys, zipfile
          target = 'TNT.app/Contents/Info.plist'
          with zipfile.ZipFile("${ASSETS}/TNT-${VERSION}.zip") as z:
              candidates = [n for n in z.namelist()
                            if n.endswith(target) and 'Frameworks/' not in n]
              if not candidates:
                  sys.exit('outer TNT.app Info.plist not found in release zip')
              with z.open(candidates[0]) as f:
                  print(plistlib.load(f)['CFBundleVersion'])
          EOF
          )
          if [ -z "$BUILD_NUMBER" ]; then
            echo "::error::failed to extract CFBundleVersion from release zip"
            exit 1
          fi
          echo "Extracted CFBundleVersion=${BUILD_NUMBER} for sparkle:version"

          # Render release body Markdown -> HTML for the appcast.
          # Sparkle's update dialog renders <description> in a WebView, so
          # raw markdown shows up to users as literal '#', '**', '`'
          # characters. `markdown` is pure-Python (~1s install); pandoc is
          # NOT preinstalled on ubuntu-latest.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body > /tmp/release-body.md
          pip3 install --quiet markdown
          python3 -m markdown -x fenced_code -x tables /tmp/release-body.md > /tmp/release-body.html

          {
            echo "ed_sig=$SIG"
            echo "zip_len=$ZIP_LEN"
            echo "build_number=$BUILD_NUMBER"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Regenerate appcast.xml
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ steps.tag.outputs.tag }}"
          ZIP_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG}/TNT-${VERSION}.zip"
          # If appcast.xml doesn't exist on gh-pages yet, seed it.
          if [ ! -s gh-pages/appcast.xml ]; then
            cat > gh-pages/appcast.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>TNT update feed</title>
              <link>https://derek-x-wang.github.io/tnt/appcast.xml</link>
              <description>Sparkle update feed for Derek-X-Wang/tnt</description>
              <language>en</language>
            </channel>
          </rss>
          EOF
          fi
          python3 scripts/append-appcast-item.py \
            --appcast gh-pages/appcast.xml \
            --version "${{ steps.meta.outputs.build_number }}" \
            --short-version "$VERSION" \
            --enclosure-url "$ZIP_URL" \
            --ed-signature "${{ steps.meta.outputs.ed_sig }}" \
            --length "${{ steps.meta.outputs.zip_len }}" \
            --description-file /tmp/release-body.html
          # Validate via stdlib — xmllint isn't on ubuntu-latest by default.
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('gh-pages/appcast.xml')"

      - name: Commit + push gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --staged --quiet; then
            echo "appcast.xml unchanged (tag may have been re-published)"
          else
            git commit -m "chore(appcast): add ${{ steps.tag.outputs.tag }}"
            git push origin gh-pages
          fi

  tap-bump:
    name: Bump Homebrew tap
    # Serialize after the appcast publish so Sparkle users always have
    # the new version even if the tap-bump step trips. Implementation
    # of issue #10 (M0/S12: Homebrew Cask formula).
    needs: publish-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout main (for helper scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          path: tnt

      - name: Bump Cask formula on tap
        id: bump
        # Don't fail the workflow if the tap repo or the PAT misbehaves —
        # the appcast already shipped. The follow-up step opens a
        # tracking issue so the maintainer notices and can recover by
        # re-running this workflow via workflow_dispatch.
        continue-on-error: true
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          set -euo pipefail
          if [ -z "$HOMEBREW_TAP_PAT" ]; then
            echo "::error::HOMEBREW_TAP_PAT secret must be set. See docs/release.md (#one-time-setup)."
            exit 1
          fi

          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ steps.tag.outputs.tag }}"
          BUMP_BRANCH="bump-${TAG}"
          REPO_OWNER="${GITHUB_REPOSITORY%%/*}"

          # 1. Download the signed dmg from the release so we can compute
          #    its SHA-256 — Homebrew verifies the cask's `sha256` field
          #    against the actual file at install time.
          mkdir -p /tmp/tap-assets
          GH_TOKEN="${{ github.token }}" gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "TNT-${VERSION}.dmg" \
            --dir /tmp/tap-assets
          DMG_SHA=$(shasum -a 256 "/tmp/tap-assets/TNT-${VERSION}.dmg" | awk '{print $1}')
          echo "computed dmg sha256: $DMG_SHA"

          # 2. Clone the tap with PAT so we can push. Fine-scoped PAT
          #    covers only Derek-X-Wang/homebrew-tnt (Contents+PRs RW).
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/${REPO_OWNER}/homebrew-tnt.git" \
            tap
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -B recreates the branch fresh on workflow_dispatch replays
          # so the diff is always against the current main, never a
          # stale earlier attempt.
          git checkout -B "$BUMP_BRANCH"
          cd ..

          # 3. Render Casks/tnt.rb + Formula/tnt.rb from release metadata.
          python3 tnt/scripts/render-homebrew.py \
            --version "$VERSION" \
            --tag "$TAG" \
            --repo-slug "$GITHUB_REPOSITORY" \
            --dmg-sha "$DMG_SHA" \
            --cask-out tap/Casks/tnt.rb \
            --formula-out tap/Formula/tnt.rb

          # 4. Commit + push the bump branch. The branch is owned by
          #    this workflow alone (no human writes to bump-*), so a
          #    -f push on replay is safe and re-bases on the current
          #    tap main without conflicts.
          cd tap
          git add Casks/tnt.rb Formula/tnt.rb
          if git diff --staged --quiet; then
            echo "tap already pinned to ${TAG} — nothing to commit"
            exit 0
          fi
          # Multiple -m flags avoid embedding heredocs inside this YAML
          # block scalar — heredoc indentation has to match the |-block
          # indent and pollutes commit-message + PR-body whitespace.
          git commit \
            -m "bump tnt to ${TAG}" \
            -m "Auto-generated by Derek-X-Wang/tnt's publish-metadata workflow." \
            -m "Source release: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}" \
            -m "Cask SHA-256: ${DMG_SHA}"
          git push -f origin "$BUMP_BRANCH"

          # 5. Open PR on the tap repo (idempotent — skip if one is
          #    already open against the bump-<tag> branch).
          EXISTING=$(gh pr list \
            --repo "${REPO_OWNER}/homebrew-tnt" \
            --head "$BUMP_BRANCH" \
            --json number --jq 'length')
          if [ "$EXISTING" != "0" ]; then
            echo "PR for ${BUMP_BRANCH} already open on ${REPO_OWNER}/homebrew-tnt"
            exit 0
          fi
          PR_BODY=/tmp/tap-pr-body.md
          {
            echo "Auto-generated by Derek-X-Wang/tnt's release pipeline."
            echo
            echo "- Tag: \`${TAG}\` (TNT ${VERSION})"
            echo "- Cask SHA-256: \`${DMG_SHA}\`"
            echo "- Source release: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
            echo
            echo "## Validation"
            echo
            echo "\`brew style --cask Casks/tnt.rb\` and \`brew audit --cask --strict Casks/tnt.rb\`"
            echo "should run locally before merging — neither is wired into this PR's CI because"
            echo "the rendered formula only exists on this branch after the workflow fires"
            echo "(see Derek-X-Wang/tnt#10)."
          } > "$PR_BODY"
          gh pr create \
            --repo "${REPO_OWNER}/homebrew-tnt" \
            --base main \
            --head "$BUMP_BRANCH" \
            --title "bump tnt to ${TAG}" \
            --body-file "$PR_BODY"

      - name: Open tracking issue on tap-bump failure
        # If the bump step continued-on-error, surface it as an issue on
        # the main tnt repo so the maintainer notices. Uses the default
        # github.token because HOMEBREW_TAP_PAT is fine-scoped to the
        # tap repo and cannot create issues on Derek-X-Wang/tnt.
        if: steps.bump.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          ISSUE_BODY=/tmp/tap-bump-failure.md
          {
            echo "The \`tap-bump\` step in \`.github/workflows/publish-metadata.yml\` failed for"
            echo "release \`${TAG}\`. Sparkle auto-updates are unaffected — installed copies"
            echo "will still pick up this version via the appcast."
            echo
            echo "- Workflow run: ${RUN_URL}"
            echo "- Tag: \`${TAG}\`"
            echo
            echo "## Recovery"
            echo
            echo "1. Confirm \`HOMEBREW_TAP_PAT\` is still valid (Settings → Secrets and"
            echo "   variables → Actions). See \`docs/release.md\` (One-time setup →"
            echo "   Homebrew tap PAT)."
            echo "2. Re-run the workflow:"
            echo
            echo "       gh workflow run publish-metadata.yml -f tag=${TAG}"
            echo
            echo "3. If the workflow still fails, render the Cask locally and push manually."
            echo "   Download \`TNT-${VERSION}.dmg\` from the release, then:"
            echo
            echo "       DMG_SHA=\$(shasum -a 256 TNT-${VERSION}.dmg | awk '{print \$1}')"
            echo "       python3 scripts/render-homebrew.py \\\\"
            echo "         --version ${VERSION} --tag ${TAG} \\\\"
            echo "         --repo-slug ${GITHUB_REPOSITORY} \\\\"
            echo "         --dmg-sha \"\$DMG_SHA\" \\\\"
            echo "         --cask-out /tmp/Casks/tnt.rb \\\\"
            echo "         --formula-out /tmp/Formula/tnt.rb"
          } > "$ISSUE_BODY"
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Homebrew tap-bump failed for ${TAG}" \
            --label needs-triage \
            --body-file "$ISSUE_BODY"
