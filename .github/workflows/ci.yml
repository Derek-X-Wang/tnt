name: CI

# Workspace skeleton CI: every pull request builds the TNTMac app target
# unsigned. This is the minimum green path for v0/M0 — additional schemes,
# tests, and lints layer on as later milestones land. Signing and notary
# live in a separate workflow once the human-issued Apple credentials are
# configured (see issue #4 / docs/adr/0005).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tntmac:
    name: Build TNTMac (Debug, unsigned)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications | grep -i Xcode || true
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -workspace apps/swift/TNT.xcworkspace \
            -scheme TNTMac \
            -configuration Debug \
            -resolvePackageDependencies

      - name: Build TNTMac scheme
        run: |
          set -o pipefail
          xcodebuild \
            -workspace apps/swift/TNT.xcworkspace \
            -scheme TNTMac \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
